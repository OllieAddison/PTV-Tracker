<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        #map-title {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: #ffffff;
            color: #111111;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 2rem;
            font-weight: 800;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            white-space: nowrap;
            max-width: calc(100% - 40px);
            text-align: center;
        }
        #popup {
            z-index: 1001;
        }
        .realtime-toggles-container {
            padding: 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            margin-bottom: 8px;
        }
        .realtime-toggle-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            user-select: none;
            cursor: pointer;
        }
        .realtime-toggle-item input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }
        .realtime-toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .realtime-color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            display: inline-block;
        }
        .realtime-count-badge {
            margin-left: auto;
            font-weight: 700;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            min-width: 24px;
            text-align: center;
        }
        </style>
        <title>Real-Time Metro Train, Tram & V/Line Train Positions</title>
    </head>
    <body>
        <div id="map">
            <div id="map-title">Real-Time Metro Train, Tram & V/Line Train Positions</div>
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/OverlandStations_1.js"></script><script src="layers/VLineTrainStations_2.js"></script><script src="layers/TramStops_3.js"></script><script src="layers/MetroTrainStations_4.js"></script><script src="layers/OverlandLines_5.js"></script><script src="layers/VlineTrainLines_6.js"></script><script src="layers/TramLines_7.js"></script><script src="layers/MetroTrainLines_8.js"></script>
        <script src="styles/OverlandStations_1_style.js"></script><script src="styles/VLineTrainStations_2_style.js"></script><script src="styles/TramStops_3_style.js"></script><script src="styles/MetroTrainStations_4_style.js"></script><script src="styles/OverlandLines_5_style.js"></script><script src="styles/VlineTrainLines_6_style.js"></script><script src="styles/TramLines_7_style.js"></script><script src="styles/MetroTrainLines_8_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>
        <script src="./resources/gtfs-realtime.js"></script>
    </body>
</html>
